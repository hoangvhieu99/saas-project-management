services:
  postgres:
    image: postgres:16-alpine
    container_name: saas-pm-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: saas
      POSTGRES_PASSWORD: saas
      POSTGRES_DB: saas_pm
    volumes:
      - saas_pm_pgdata:/var/lib/postgresql/data

volumes:
  saas_pm_pgdata:
